# =============================================================
# k8s/mysql/deployment.yaml  ─  MySQL 8.0 배포
#
# - arm64 호환: mysql:8.0 공식 이미지는 멀티아치 지원
# - 비밀번호: mysql-secret에서 주입 (kubectl로 직접 생성)
# - 데이터 영속화: mysql-pvc 마운트
# - 단일 인스턴스 (replicas: 1) — MySQL은 기본적으로 단일 Primary
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: kube-fortune
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  strategy:
    type: Recreate    # PVC RWO 특성상 Rolling 불가 → Recreate 필수
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306

          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_DATABASE

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql

          # MySQL 기동 확인 (초기화 시간이 길어 initialDelaySeconds 넉넉히)
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5

          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3

      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
