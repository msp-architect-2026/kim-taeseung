# =============================================================
# k8s/mysql/pvc.yaml  ─  MySQL 데이터 영속화용 PVC
#
# StorageClass: local-path (rancher.io/local-path)
# WaitForFirstConsumer 모드 → 파드 스케줄 후 PV 자동 생성
# =============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: kube-fortune
  labels:
    app: mysql
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
