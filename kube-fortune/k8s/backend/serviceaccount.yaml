# =============================================================
# serviceaccount.yaml  ─  Backend 파드용 ServiceAccount
#
# Backend 파드가 K8s Metrics API에 접근하려면
# 일반 default ServiceAccount가 아닌 전용 계정이 필요합니다.
# ClusterRole/ClusterRoleBinding과 함께 사용됩니다.
# =============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fortune-backend-sa
  namespace: kube-fortune
  labels:
    app: fortune-backend
