# =============================================================
# nginx.local.conf  ─  Docker Compose 로컬 테스트 전용
#
# [왜 이 파일이 필요한가?]
# K8s 환경에서는 Ingress-Nginx가 /api/* 요청을 Backend로 라우팅.
# 하지만 Docker Compose에는 Ingress가 없으므로,
# 브라우저의 모든 요청(정적파일 + API)이 이 Nginx 컨테이너로 들어옴.
# 따라서 Nginx가 /api/* 를 직접 Backend 컨테이너로 proxy_pass 해야 함.
#
# docker-compose.yml에서 이 파일을 마운트하여 사용:
#   volumes:
#     - ./nginx.local.conf:/etc/nginx/conf.d/default.conf
# =============================================================
server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # /api/* → Backend 컨테이너로 프록시 (docker-compose 서비스명: backend)
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # SPA fallback (React Router 대비)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 에셋 캐시
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}
