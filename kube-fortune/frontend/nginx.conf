# =============================================================
# nginx.conf  ─  K8s 프로덕션 전용
# /api/* 요청은 K8s Ingress-Nginx가 Backend Service로 라우팅하므로
# 이 Nginx는 정적 파일 서빙만 담당합니다.
# =============================================================
server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # SPA fallback (React Router 대비)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/ 는 Ingress가 처리 → 여기까지 오면 안 됨
    # (혹시라도 직접 접근 시 안내 메시지 반환)
    location /api/ {
        return 502 '{"error":"API requests must be routed via Ingress"}';
        add_header Content-Type application/json;
    }

    # 정적 에셋 캐시
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;
}
