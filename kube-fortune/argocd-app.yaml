apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-fortune
  namespace: argocd
  # ArgoCD가 이 Application 리소스 자체를 삭제할 때
  # 연결된 K8s 리소스도 함께 삭제하도록 설정
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: 'http://192.168.64.20/root/kube-fortune.git'
    targetRevision: main
    path: k8s
    directory:
      recurse: true   # k8s/frontend, k8s/backend 하위 폴더까지 모두 탐색
      # ⚠ secret.yaml은 모든 하위 폴더 포함하여 ArgoCD 관리에서 제외
      # → GEMINI_API_KEY, MySQL 비밀번호 등 민감 정보는 kubectl로 직접 주입
      # → 플레이스홀더 값이 실제 Secret을 덮어쓰는 사고 방지
      exclude: '**/secret.yaml'

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-fortune

  syncPolicy:
    automated:
      prune: true       # Git에서 삭제된 리소스를 K8s에서도 자동 삭제
      selfHeal: true    # K8s 리소스가 수동으로 변경되면 Git 상태로 자동 복구
    syncOptions:
      - CreateNamespace=true  # kube-fortune 네임스페이스가 없으면 자동 생성
      - ApplyOutOfSyncOnly=true  # 변경된 리소스만 apply (불필요한 재배포 방지)
